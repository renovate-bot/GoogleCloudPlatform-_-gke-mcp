name: "Build UI"
description: "Sets up Node.js and builds the UI"
runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: "Install UI dependencies"
      shell: bash
      run: npm --prefix ui ci
    - name: "Run dev/ci/presubmits/ui-build.sh"
      shell: bash
      run: ./dev/ci/presubmits/ui-build.sh
