name: presubmit

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: ["main"]

permissions: read-all

jobs:
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: "read"
    steps:
      - uses: actions/checkout@v4
      - name: "Run dev/ci/presubmits/docker-build.sh"
        run: |
          ./dev/ci/presubmits/docker-build.sh

  go-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: "read"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - uses: ./.github/actions/build-ui
      - name: "Run dev/ci/presubmits/go-build.sh"
        run: |
          ./dev/ci/presubmits/go-build.sh

  go-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: "read"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - uses: ./.github/actions/build-ui
      - name: "Run dev/ci/presubmits/go-test.sh"
        run: |
          ./dev/ci/presubmits/go-test.sh

  ui-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: "read"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: "Install UI dependencies"
        shell: bash
        run: npm --prefix ui ci
      - name: "Run UI tests"
        run: |
          ./dev/ci/presubmits/ui-test.sh

  go-vet:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: "read"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - uses: ./.github/actions/build-ui
      - name: "Run dev/ci/presubmits/go-vet.sh"
        run: |
          ./dev/ci/presubmits/go-vet.sh

  golangci-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: "read"
      checks: "write" # For annotations on PRs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - uses: ./.github/actions/build-ui
      - name: "Install golangci-lint"
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin
      - name: "Run golangci-lint"
        run: |
          ./dev/ci/presubmits/golangci-lint.sh

  verify-format:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: "read"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - uses: ./.github/actions/build-ui
      - name: "Run dev/ci/presubmits/verify-format.sh"
        run: |
          ./dev/ci/presubmits/verify-format.sh

  verify-gomod:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: "read"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - name: "Run dev/ci/presubmits/verify-gomod.sh"
        run: |
          ./dev/ci/presubmits/verify-gomod.sh

  super-linter:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      # contents permission to clone the repository
      contents: read
      packages: read
      # issues and pull-requests permissions to write results as pull
      # request comments. Omit them if you don't need summary comments
      issues: write
      pull-requests: write
      # To report GitHub Actions status checks. Omit if you don't need
      # to update commit status
      statuses: write
    steps:
      - uses: actions/checkout@v4
        with:
          # super-linter needs the full git history to get the
          # list of files that changed across commits
          fetch-depth: 0
          persist-credentials: false
      - name: "Super-linter"
        uses: super-linter/super-linter/slim@v8.5.0
        env:
          # To report GitHub Actions status checks
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: main
          VALIDATE_BASH: true
          VALIDATE_CHECKOV: true
          VALIDATE_MARKDOWN: true
          VALIDATE_MARKDOWN_PRETTIER: true
          VALIDATE_NATURAL_LANGUAGE: true
          VALIDATE_YAML: true
          VALIDATE_YAML_PRETTIER: true

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true
